<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Left Gradient (Purples) -->
    <linearGradient id="grad-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a0845;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#642b73;stop-opacity:1" />
    </linearGradient>
    
    <!-- Central Gradient (Pink to Red) -->
    <radialGradient id="grad-center" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ff00cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1b5e;stop-opacity:1" />
    </radialGradient>
    
    <!-- Right Gradient (Orange to Yellow) -->
    <linearGradient id="grad-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff1b5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>

    <!-- Global Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(250, 120)" filter="url(#glow)">
    <!-- Dispersion Rings Left -->
    <path d="M -90 0 A 90 60 0 1 1 -90 0.1" fill="none" stroke="#4B1D7B" stroke-width="8" opacity="0.4" transform="scale(1.1, 0.9) translate(-10, 0)"/>
    <path d="M -80 0 A 80 55 0 1 1 -80 0.1" fill="none" stroke="#6A1B9A" stroke-width="10" opacity="0.6" transform="scale(1.05, 0.95) translate(-5, 0)"/>
    
    <!-- Center Circle -->
    <circle cx="0" cy="0" r="50" fill="url(#grad-center)" />
    
    <!-- Dispersion Rings Right -->
    <path d="M 80 0 A 80 55 0 1 0 80 0.1" fill="none" stroke="#FF5722" stroke-width="10" opacity="0.6" transform="scale(1.05, 0.95) translate(5, 0)"/>
    <path d="M 90 0 A 90 60 0 1 0 90 0.1" fill="none" stroke="#FF8C00" stroke-width="8" opacity="0.4" transform="scale(1.1, 0.9) translate(10, 0)"/>
  </g>

  <!-- Title Text -->
  <text x="250" y="240" font-family="Arial, sans-serif" font-weight="900" font-style="italic" font-size="32" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    ENLYTEN2 LASER CENTER
  </text>
</svg>
